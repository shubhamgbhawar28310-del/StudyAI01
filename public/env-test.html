<!DOCTYPE html>
<html>
<head>
    <title>Environment Variables Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Environment Variables Test</h1>
    <div id="results"></div>

    <script type="module">
        const resultsDiv = document.getElementById('results');
        
        // Test if environment variables are accessible
        resultsDiv.innerHTML += '<div class="result">Testing environment variables...</div>';
        
        // Check if import.meta.env is available
        if (import.meta.env) {
            resultsDiv.innerHTML += '<div class="result success">✅ import.meta.env is available</div>';
            
            // Check specific environment variables
            const apiUrl = import.meta.env.VITE_API_URL;
            const googleApiKey = import.meta.env.VITE_GOOGLE_AI_API_KEY;
            
            if (apiUrl) {
                resultsDiv.innerHTML += `<div class="result success">✅ VITE_API_URL: ${apiUrl}</div>`;
            } else {
                resultsDiv.innerHTML += '<div class="result error">❌ VITE_API_URL not found</div>';
            }
            
            if (googleApiKey) {
                resultsDiv.innerHTML += `<div class="result success">✅ VITE_GOOGLE_AI_API_KEY: ${googleApiKey.substring(0, 10)}... (hidden for security)</div>`;
            } else {
                resultsDiv.innerHTML += '<div class="result error">❌ VITE_GOOGLE_AI_API_KEY not found</div>';
            }
        } else {
            resultsDiv.innerHTML += '<div class="result error">❌ import.meta.env is not available</div>';
        }
        
        // Test if we can access the Google Generative AI library
        try {
            import('https://esm.run/@google/generative-ai').then(() => {
                resultsDiv.innerHTML += '<div class="result success">✅ @google/generative-ai library loaded successfully</div>';
            }).catch(error => {
                resultsDiv.innerHTML += `<div class="result error">❌ Failed to load @google/generative-ai library: ${error.message}</div>`;
            });
        } catch (error) {
            resultsDiv.innerHTML += `<div class="result error">❌ Error importing @google/generative-ai library: ${error.message}</div>`;
        }
    </script>
</body>
</html>
