<!DOCTYPE html>
<html>
<head>
    <title>Verify AI Fix</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 800px; }
        button { padding: 10px 20px; margin: 10px 0; background-color: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #4338ca; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; background-color: #f3f4f6; }
        .success { background-color: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .info { background-color: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
        pre { white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body>
    <h1>Verify AI Service Fix</h1>
    <p>This page tests the fixed AI service configuration.</p>
    
    <button id="testBasic">Test Basic AI Response</button>
    <button id="testChat">Test Chat Functionality</button>
    <button id="testStructured">Test Structured Output</button>
    
    <div id="result"></div>

    <script type="module">
        // Import the Google Generative AI library from CDN
        import { GoogleGenAI, Type } from 'https://aistudiocdn.com/@google/genai@^1.22.0';
        
        const resultDiv = document.getElementById('result');
        const apiKey = 'AIzaSyABaiEo9-auIArdwzwvlYgVLeg-c5gIdVc';
        const ai = new GoogleGenAI({ apiKey });
        const model = 'gemini-2.5-flash';
        
        function showResult(message, type = 'info') {
            resultDiv.innerHTML = `<pre>${message}</pre>`;
            resultDiv.className = type;
        }
        
        function disableButtons() {
            document.querySelectorAll('button').forEach(btn => btn.disabled = true);
        }
        
        function enableButtons() {
            document.querySelectorAll('button').forEach(btn => btn.disabled = false);
        }
        
        document.getElementById('testBasic').addEventListener('click', async () => {
            disableButtons();
            showResult('Testing basic AI response...', 'info');
            
            try {
                const response = await ai.models.generateContent({
                    model: model,
                    contents: "Hello, this is a test. Please respond with a short greeting."
                });
                
                showResult(`✅ Basic AI Response Test Passed!\n\nResponse: ${response.text}`, 'success');
            } catch (error) {
                showResult(`❌ Basic AI Response Test Failed!\n\nError: ${error.message}`, 'error');
            } finally {
                enableButtons();
            }
        });
        
        document.getElementById('testChat').addEventListener('click', async () => {
            disableButtons();
            showResult('Testing chat functionality...', 'info');
            
            try {
                const chat = ai.chats.create({
                    model: model,
                    config: {
                        systemInstruction: "You are a helpful study assistant."
                    }
                });
                
                const response = await chat.sendMessage({ 
                    message: "What are the best study techniques for exams?" 
                });
                
                showResult(`✅ Chat Functionality Test Passed!\n\nResponse: ${response.text}`, 'success');
            } catch (error) {
                showResult(`❌ Chat Functionality Test Failed!\n\nError: ${error.message}`, 'error');
            } finally {
                enableButtons();
            }
        });
        
        document.getElementById('testStructured').addEventListener('click', async () => {
            disableButtons();
            showResult('Testing structured output...', 'info');
            
            try {
                const flashcardSchema = {
                    type: Type.ARRAY,
                    description: "An array of flashcard objects.",
                    items: {
                        type: Type.OBJECT,
                        properties: {
                            front: { type: Type.STRING, description: "The question or term on the front of the flashcard." },
                            back: { type: Type.STRING, description: "The answer or definition on the back of the flashcard." }
                        },
                        required: ['front', 'back']
                    }
                };
                
                const response = await ai.models.generateContent({
                    model: model,
                    contents: "Create 2 flashcards about photosynthesis.",
                    config: {
                        systemInstruction: "Create flashcards for studying.",
                        responseMimeType: 'application/json',
                        responseSchema: flashcardSchema,
                    }
                });
                
                const flashcards = JSON.parse(response.text.trim());
                let output = "✅ Structured Output Test Passed!\n\nFlashcards:\n";
                flashcards.forEach((card, index) => {
                    output += `\n${index + 1}. ${card.front}\n   ${card.back}\n`;
                });
                
                showResult(output, 'success');
            } catch (error) {
                showResult(`❌ Structured Output Test Failed!\n\nError: ${error.message}`, 'error');
            } finally {
                enableButtons();
            }
        });
    </script>
</body>
</html>
