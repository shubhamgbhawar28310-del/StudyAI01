<!DOCTYPE html>
<html>
<head>
    <title>Audio Test</title>
</head>
<body>
    <h2>Audio Element Test</h2>
    
    <!-- Test 1: Direct MP3 from external source -->
    <h3>Test 1: External MP3</h3>
    <audio controls id="test1">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <button onclick="playTest1()">Play Test 1</button>
    
    <!-- Test 2: Your Supabase file -->
    <h3>Test 2: Your Supabase File</h3>
    <audio controls id="test2">
        <source src="https://crdqpioymuvnzhtgrenj.supabase.co/storage/v1/object/public/music/uploads/Untitled%20video%20-%20Made%20with%20Clipchamp%20(1).mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <button onclick="playTest2()">Play Test 2</button>
    
    <!-- Test 3: JavaScript controlled -->
    <h3>Test 3: JavaScript Controlled</h3>
    <audio id="test3"></audio>
    <button onclick="playTest3()">Play Test 3 (JS)</button>
    
    <div id="results"></div>
    
    <script>
        function log(message) {
            document.getElementById('results').innerHTML += '<br>' + message;
            console.log(message);
        }
        
        function playTest1() {
            const audio = document.getElementById('test1');
            audio.play().then(() => {
                log('Test 1: SUCCESS - External MP3 played');
            }).catch(err => {
                log('Test 1: ERROR - ' + err.message);
            });
        }
        
        function playTest2() {
            const audio = document.getElementById('test2');
            audio.play().then(() => {
                log('Test 2: SUCCESS - Supabase file played');
            }).catch(err => {
                log('Test 2: ERROR - ' + err.message);
            });
        }
        
        function playTest3() {
            const audio = document.getElementById('test3');
            audio.src = 'https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3';
            audio.load();
            
            audio.addEventListener('canplay', () => {
                log('Test 3: Audio can play');
            });
            
            audio.addEventListener('error', (e) => {
                log('Test 3: Audio error - ' + e.message);
            });
            
            audio.play().then(() => {
                log('Test 3: SUCCESS - JS controlled audio played');
            }).catch(err => {
                log('Test 3: ERROR - ' + err.message);
            });
        }
        
        // Check browser support
        const audio = document.createElement('audio');
        log('Browser supports MP3: ' + (audio.canPlayType('audio/mpeg') !== ''));
        log('Browser supports WAV: ' + (audio.canPlayType('audio/wav') !== ''));
        log('Browser supports OGG: ' + (audio.canPlayType('audio/ogg') !== ''));
    </script>
</body>
</html>
